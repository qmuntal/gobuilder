name: builder

on:
  workflow_dispatch:

permissions: {}

jobs:
  luci:
    runs-on: windows-11-arm
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Install LUCI builder tools
        run: |
          $toolRoot = Join-Path $env:RUNNER_TEMP "luci-tools"
          New-Item -ItemType Directory -Force -Path $toolRoot | Out-Null
          curl.exe -sSL -o (Join-Path $toolRoot "luci_machine_tokend.exe") "https://storage.googleapis.com/go-builder-data/windows-arm64-luci_machine_tokend.exe"
          curl.exe -sSL -o (Join-Path $toolRoot "bootstrapswarm.exe") "https://storage.googleapis.com/go-builder-data/windows-arm64-bootstrapswarm.exe"
          Add-Content -Path $env:GITHUB_PATH -Value $toolRoot

      - name: Prepare LUCI credentials
        env:
          LUCI_BOT_HOSTNAME: ${{ vars.LUCI_BOT_HOSTNAME }}
          LUCI_BOT_CERT_PEM: ${{ vars.LUCI_BOT_CERT_PEM }}
          LUCI_BOT_KEY_PEM: ${{ secrets.LUCI_BOT_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LUCI_BOT_HOSTNAME)) { Write-Error "LUCI_BOT_HOSTNAME variable is required"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($env:LUCI_BOT_CERT_PEM)) { Write-Error "LUCI_BOT_CERT_PEM variable is required"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($env:LUCI_BOT_KEY_PEM)) { Write-Error "LUCI_BOT_KEY_PEM secret is required"; exit 1 }

          $luciRoot = Join-Path $env:RUNNER_TEMP "luci"
          New-Item -ItemType Directory -Force -Path $luciRoot | Out-Null

          $certFile = Join-Path $luciRoot "hostname.cert"
          $keyFile = Join-Path $luciRoot "hostname.key"
          $tokenFile = Join-Path $luciRoot "token.json"
          $statusFile = Join-Path $luciRoot "token-status.json"

          function Convert-ToPemText {
            param(
              [Parameter(Mandatory = $true)][string] $Value,
              [Parameter(Mandatory = $true)][string] $Name,
              [Parameter(Mandatory = $true)][string[]] $ExpectedLabels
            )

            $pem = $Value.Trim().Replace("\r\n", "`n").Replace("\n", "`n").Replace("`r`n", "`n").Replace("`r", "`n").Trim()
            $hasExpectedLabel = $false
            foreach ($expectedLabel in $ExpectedLabels) {
              if ($pem.Contains("-----BEGIN $expectedLabel-----") -and $pem.Contains("-----END $expectedLabel-----")) {
                $hasExpectedLabel = $true
                break
              }
            }
            if (-not $hasExpectedLabel) {
              Write-Error "$Name must be a PEM block containing one of: $($ExpectedLabels -join ', ')"
              exit 1
            }

            return $pem + "`n"
          }

          [System.IO.File]::WriteAllText($certFile, (Convert-ToPemText -Value $env:LUCI_BOT_CERT_PEM -Name "LUCI_BOT_CERT_PEM" -ExpectedLabels @("CERTIFICATE")), [System.Text.Encoding]::ASCII)
          [System.IO.File]::WriteAllText($keyFile, (Convert-ToPemText -Value $env:LUCI_BOT_KEY_PEM -Name "LUCI_BOT_KEY_PEM" -ExpectedLabels @("RSA PRIVATE KEY", "PRIVATE KEY")), [System.Text.Encoding]::ASCII)

          try {
            $certificate = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certFile)
            $certificate.Dispose()
          } catch {
            Write-Error "LUCI_BOT_CERT_PEM was written but could not be parsed as an X.509 certificate"
            exit 1
          }

          try {
            $rsa = [System.Security.Cryptography.RSA]::Create()
            try {
              $rsa.ImportFromPem([System.IO.File]::ReadAllText($keyFile))
            } finally {
              $rsa.Dispose()
            }
          } catch {
            Write-Error "LUCI_BOT_KEY_PEM was written but could not be parsed as an RSA private key"
            exit 1
          }

          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_BOT_HOSTNAME=$env:LUCI_BOT_HOSTNAME"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_CERT_FILE=$certFile"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_KEY_FILE=$keyFile"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_TOKEN_FILE=$tokenFile"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_TOKEN_STATUS_FILE=$statusFile"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_MACHINE_TOKEN=$tokenFile"
          Add-Content -Path $env:GITHUB_ENV -Value "SWARMING_NEVER_REBOOT=true"

      - name: Mint LUCI machine token
        run: >
          luci_machine_tokend
          -backend luci-token-server.appspot.com
          -cert-pem "$env:LUCI_CERT_FILE"
          -pkey-pem "$env:LUCI_KEY_FILE"
          -token-file "$env:LUCI_TOKEN_FILE"
          -status-file "$env:LUCI_TOKEN_STATUS_FILE"
          -force-refresh

      #- name: Register LUCI builder
      #  run: bootstrapswarm -hostname "$env:LUCI_BOT_HOSTNAME"
