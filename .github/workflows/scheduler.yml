name: scheduler

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:
    inputs:
      max_jobs:
        description: Maximum builder runs to start
        required: false
      builder_name:
        description: Only count queued LUCI builders whose name contains this value
        required: false

permissions:
  actions: write
  contents: read

concurrency:
  group: scheduler
  cancel-in-progress: false

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scheduler
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Dispatch builder jobs
        run: >
          go run ./cmd/scheduler
          --github-api-url "${{ github.api_url }}"
          --github-token "${{ github.token }}"
          --repository "${{ github.repository }}"
          --ref "${{ github.ref_name }}"
          --scheduler-run-id "${{ github.run_id }}"
          --workflow "builder.yml"
          --buildbucket-builder-name "${{ inputs.builder_name }}"
          --max-jobs "${{ inputs.max_jobs }}"