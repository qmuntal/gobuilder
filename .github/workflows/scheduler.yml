name: scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      max_jobs:
        description: Maximum active builder slots
        required: false
        default: 5
      builder_name:
        description: Only count queued LUCI builders whose name contains this value
        required: false
        default: windows-arm64

permissions:
  actions: write
  contents: read

concurrency:
  group: scheduler
  cancel-in-progress: false

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scheduler
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Build scheduler
        run: go build -o scheduler ./cmd/scheduler

      - name: Dispatch builder jobs
        run: >
          ./scheduler
          --github-api-url "${{ github.api_url }}"
          --github-token "${{ github.token }}"
          --repository "${{ github.repository }}"
          --ref "${{ github.ref_name }}"
          --workflow "builder-${{ inputs.builder_name }}.yml"
          --buildbucket-builder-name "${{ inputs.builder_name }}"
          --max-jobs "${{ inputs.max_jobs }}"
