name: scheduler

on:
  schedule:
    - cron: "*/3 * * * *"
  workflow_dispatch:
    inputs:
      fixed_jobs:
        description: Queue size returned by the fixed queue
        required: false
        default: "2"
      max_jobs:
        description: Maximum builder runs to start
        required: false
        default: "5"

permissions:
  actions: write
  contents: read

concurrency:
  group: scheduler
  cancel-in-progress: false

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out scheduler
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Dispatch builder jobs
        run: >
          go run ./cmd/scheduler
          --github-api-url "${{ github.api_url }}"
          --github-token "${{ github.token }}"
          --repository "${{ github.repository }}"
          --ref "${{ github.ref_name }}"
          --scheduler-run-id "${{ github.run_id }}"
          --fixed-jobs "${{ inputs.fixed_jobs || vars.SCHEDULER_FIXED_JOBS || '2' }}"
          --max-jobs "${{ inputs.max_jobs || vars.SCHEDULER_MAX_JOBS || '5' }}"