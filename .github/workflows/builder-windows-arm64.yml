name: builder-windows-arm64
run-name: builder-windows-arm64 bot ${{ inputs.bot_index }}

on:
  workflow_dispatch:
    inputs:
      bot_index:
        description: Two-digit stable LUCI bot slot index
        required: false
        default: "99"

permissions: {}

jobs:
  luci:
    runs-on: windows-11-arm
    concurrency:
      group: builder-windows-arm64-${{ inputs.bot_index }}
      cancel-in-progress: false
    env:
      LLVM_MINGW_VERSION: "20250514"
      LLVM_MINGW_DIR: C:\llvm-mingw
      LLVM_MINGW_SHA256: d5b609a7f2857eac0c035e290a77012e177f58444f5cfa27c649d766c2d8c1d1
      LUCI_BOT_HOSTNAME_PREFIX: windows-arm64-azure-qmuntal
      LUCI_MACHINE_TOKEN_BACKEND: luci-token-server.appspot.com
      LUCI_MACHINE_TOKEN: C:\golang\token.json
      LUCI_TOOL_ROOT: C:\golang
      SWARMING_HOME: C:\swarming-home
      SWARMING_USER: swarming
      SWARMING_WORKDIR: C:\b
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Set LUCI bot hostname
        run: |
          $botIndex = "${{ inputs.bot_index }}".Trim()
          if ($botIndex -notmatch '^\d{2}$') {
            Write-Error "bot_index must be exactly two digits, got '$botIndex'"
            exit 1
          }

          $botIndexNumber = [int]$botIndex
          if ($botIndexNumber -lt 1) {
            Write-Error "bot_index must be greater than zero, got '$botIndex'"
            exit 1
          }

          $hostname = "$env:LUCI_BOT_HOSTNAME_PREFIX--$botIndex"
          Add-Content -Path $env:GITHUB_ENV -Value "LUCI_BOT_HOSTNAME=$hostname"
          Write-Host "LUCI bot hostname: $hostname"

      - name: Cache llvm-mingw toolchain
        id: cache-llvm-mingw
        uses: actions/cache@v5
        with:
          path: ${{ env.LLVM_MINGW_DIR }}
          key: llvm-mingw-windows-arm64-${{ env.LLVM_MINGW_VERSION }}

      - name: Install llvm-mingw toolchain
        if: steps.cache-llvm-mingw.outputs.cache-hit != 'true'
        run: |
          # Go's CGO on Windows expects a MinGW-compatible C toolchain.
          # The Azure startup.ps1 notes that LUCI builders get compilers
          # via CIPD; for GitHub Actions we download llvm-mingw directly.
          $archive = "llvm-mingw-$($env:LLVM_MINGW_VERSION)-ucrt-aarch64.zip"
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$($env:LLVM_MINGW_VERSION)/${archive}"

          Write-Host "Downloading llvm-mingw from $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\$archive" -UseBasicParsing
          $actualHash = (Get-FileHash -Algorithm SHA256 -Path "$env:TEMP\$archive").Hash.ToLowerInvariant()
          if ($actualHash -ne $env:LLVM_MINGW_SHA256) {
            Write-Error "llvm-mingw SHA256 mismatch: got $actualHash, want $env:LLVM_MINGW_SHA256"
            exit 1
          }

          Write-Host "Extracting to $env:LLVM_MINGW_DIR"
          Remove-Item -Recurse -Force $env:LLVM_MINGW_DIR -ErrorAction SilentlyContinue
          Expand-Archive -Path "$env:TEMP\$archive" -DestinationPath "C:\"
          Rename-Item "C:\llvm-mingw-$($env:LLVM_MINGW_VERSION)-ucrt-aarch64" $env:LLVM_MINGW_DIR

      - name: Add llvm-mingw to PATH
        run: |
          $bin = Join-Path $env:LLVM_MINGW_DIR "bin"
          if (-not (Test-Path (Join-Path $bin "gcc.exe"))) {
            Write-Error "llvm-mingw gcc.exe not found in $bin"
            exit 1
          }

          # Put llvm-mingw at the front of PATH so its gcc/clang shadow
          # the x86-64 MinGW gcc that ships with Git for Windows.
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          $env:PATH = "$bin;$env:PATH"

          Write-Host "CC: $(gcc --version 2>&1 | Select-Object -First 1)"
          Write-Host "Target: $(gcc -dumpmachine)"

      - name: Remove broken x86-64 tools
        run: |
          # Several tools pre-installed on the runner (from Strawberry Perl,
          # Git-for-Windows, etc.) are x86-64 binaries that crash or
          # misbehave under ARM64 emulation. Remove them so the Go test
          # suite skips the dependent tests instead of failing.
          foreach ($tool in @("gdb", "patch", "pkg-config")) {
            $commands = @(Get-Command $tool -CommandType Application -All -ErrorAction SilentlyContinue)
            if ($commands.Count -gt 0) {
              foreach ($cmd in $commands) {
                Write-Host "Removing $tool at $($cmd.Source)"
                Remove-Item $cmd.Source -Force
              }
            } else {
              Write-Host "$tool not found, nothing to remove"
            }
          }

      - name: Locate Python
        id: python
        run: |
          $python = Get-Command python3 -ErrorAction SilentlyContinue
          if (-not $python) {
            $python = Get-Command python -ErrorAction SilentlyContinue
          }
          if (-not $python) {
            Write-Error "python or python3 is required for bootstrapswarm"
            exit 1
          }

          $version = & $python.Source -c "import platform; print(platform.python_version())"
          $cacheDir = & $python.Source -m pip cache dir
          Add-Content -Path $env:GITHUB_ENV -Value "PYTHON_EXE=$($python.Source)"
          Add-Content -Path $env:GITHUB_ENV -Value "PIP_CACHE_DIR=$cacheDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-windows-arm64-${{ steps.python.outputs.version }}-pywin32

      - name: Install pywin32
        run: |
          & $env:PYTHON_EXE -m pip install --upgrade pip
          & $env:PYTHON_EXE -m pip install pywin32

      - name: Prepare swarming user
        run: |
          $swarmingPassword = "G0b!" + [Guid]::NewGuid().ToString("N") + "Aa1!"
          Write-Output "::add-mask::$swarmingPassword"
          $securePassword = ConvertTo-SecureString $swarmingPassword -AsPlainText -Force

          if (-not (Get-LocalUser -Name $env:SWARMING_USER -ErrorAction SilentlyContinue)) {
            Write-Host "Creating $env:SWARMING_USER user"
            New-LocalUser -Name $env:SWARMING_USER -Password $securePassword -PasswordNeverExpires -AccountNeverExpires
          } else {
            Write-Host "$env:SWARMING_USER user already exists"
            Set-LocalUser -Name $env:SWARMING_USER -Password $securePassword -PasswordNeverExpires $true
          }

          try {
            Add-LocalGroupMember -Group "Administrators" -Member $env:SWARMING_USER -ErrorAction Stop
          } catch [Microsoft.PowerShell.Commands.MemberExistsException] {
            Write-Host "$env:SWARMING_USER is already in Administrators"
          }

          New-Item -ItemType Directory -Force -Path $env:SWARMING_WORKDIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:SWARMING_HOME | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $env:SWARMING_HOME "temp") | Out-Null
          icacls $env:SWARMING_WORKDIR /setowner $env:SWARMING_USER
          icacls $env:SWARMING_WORKDIR /grant "${env:SWARMING_USER}:(OI)(CI)F"
          icacls $env:SWARMING_HOME /setowner $env:SWARMING_USER
          icacls $env:SWARMING_HOME /grant "${env:SWARMING_USER}:(OI)(CI)F"

          Add-Content -Path $env:GITHUB_ENV -Value "SWARMING_PASSWORD=$swarmingPassword"

      - name: Install LUCI builder tools
        run: |
          New-Item -ItemType Directory -Force -Path $env:LUCI_TOOL_ROOT | Out-Null
          curl.exe -sSL -o (Join-Path $env:LUCI_TOOL_ROOT "luci_machine_tokend.exe") "https://storage.googleapis.com/go-builder-data/windows-arm64-luci_machine_tokend.exe"
          curl.exe -sSL -o (Join-Path $env:LUCI_TOOL_ROOT "bootstrapswarm.exe") "https://storage.googleapis.com/go-builder-data/windows-arm64-bootstrapswarm.exe"
          icacls $env:LUCI_TOOL_ROOT /grant "${env:SWARMING_USER}:(OI)(CI)RX"

      - name: Mint LUCI machine token
        env:
          LUCI_BOT_CERT_PEM: ${{ vars.LUCI_BOT_CERT_PEM }}
          LUCI_BOT_KEY_PEM: ${{ secrets.LUCI_BOT_KEY_PEM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LUCI_BOT_CERT_PEM)) { Write-Error "LUCI_BOT_CERT_PEM variable is required"; exit 1 }
          if ([string]::IsNullOrWhiteSpace($env:LUCI_BOT_KEY_PEM)) { Write-Error "LUCI_BOT_KEY_PEM secret is required"; exit 1 }

          $luciRoot = Join-Path $env:RUNNER_TEMP "luci"
          New-Item -ItemType Directory -Force -Path $luciRoot | Out-Null

          $certFile = Join-Path $luciRoot "hostname.cert"
          $keyFile = Join-Path $luciRoot "hostname.key"

          # GitHub variables/secrets may preserve real newlines or literal \n escapes; write normalized PEM files for tokend.
          $certPem = $env:LUCI_BOT_CERT_PEM.Trim().Replace("\r\n", "`n").Replace("\n", "`n").Replace("`r`n", "`n").Replace("`r", "`n").Trim() + "`n"
          $keyPem = $env:LUCI_BOT_KEY_PEM.Trim().Replace("\r\n", "`n").Replace("\n", "`n").Replace("`r`n", "`n").Replace("`r", "`n").Trim() + "`n"
          [System.IO.File]::WriteAllText($certFile, $certPem, [System.Text.Encoding]::ASCII)
          [System.IO.File]::WriteAllText($keyFile, $keyPem, [System.Text.Encoding]::ASCII)

          $tokenExitCode = 0
          try {
            & (Join-Path $env:LUCI_TOOL_ROOT "luci_machine_tokend.exe") `
              -backend $env:LUCI_MACHINE_TOKEN_BACKEND `
              -cert-pem $certFile `
              -pkey-pem $keyFile `
              -token-file $env:LUCI_MACHINE_TOKEN
            $tokenExitCode = $LASTEXITCODE
          } finally {
            Remove-Item -Path $certFile, $keyFile -Force -ErrorAction SilentlyContinue
          }
          if ($tokenExitCode -ne 0) {
            exit $tokenExitCode
          }

          icacls $env:LUCI_MACHINE_TOKEN /grant "${env:SWARMING_USER}:R"

      - name: Register LUCI builder
        timeout-minutes: 60
        run: |
          $swarmingTemp = Join-Path $env:SWARMING_HOME "temp"
          New-Item -ItemType Directory -Force -Path $swarmingTemp | Out-Null

          $environment = @{
            TEMP = $swarmingTemp
            TMP = $swarmingTemp
            USERPROFILE = $env:SWARMING_HOME
            USERNAME = $env:SWARMING_USER
            USER = $env:SWARMING_USER
            LOGNAME = $env:SWARMING_USER
            LUCI_MACHINE_TOKEN = $env:LUCI_MACHINE_TOKEN
          }

          $securePassword = ConvertTo-SecureString $env:SWARMING_PASSWORD -AsPlainText -Force
          $credential = [System.Management.Automation.PSCredential]::new(".\$env:SWARMING_USER", $securePassword)
          $process = Start-Process `
            -FilePath (Join-Path $env:LUCI_TOOL_ROOT "bootstrapswarm.exe") `
            -ArgumentList @("-hostname", $env:LUCI_BOT_HOSTNAME) `
            -Credential $credential `
            -Environment $environment `
            -WorkingDirectory $env:SWARMING_WORKDIR `
            -Wait `
            -PassThru
          exit $process.ExitCode
